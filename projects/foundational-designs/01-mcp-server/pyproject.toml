[project]
name = "acme-mcp-server"
version = "0.1.0"
description = "Demo MCP server generated from OpenAPI spec"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=3.2",
    "httpx>=0.27",
    "uvicorn>=0.30",
]

[project.scripts]
acme-mcp = "server_from_spec:main"
acme-mcp-curated = "server_curated:main"
